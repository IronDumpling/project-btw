name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile backend
        run: python -m py_compile main.py config.py utils.py routers/*.py

      - name: Import FastAPI app
        run: python -c "from main import app; print(app.title)"

  mobile-ios:
    name: Mobile iOS validation
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: "1"
    defaults:
      run:
        working-directory: mobile/ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/ios/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Expo doctor
        run: npm run doctor

      - name: Audit production dependencies
        run: npm audit --audit-level=moderate --registry=https://registry.npmjs.org
