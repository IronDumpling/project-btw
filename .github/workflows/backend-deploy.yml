name: Backend Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - production

jobs:
  validate:
    name: Validate backend before deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile backend
        run: python -m py_compile main.py config.py utils.py routers/*.py

  deploy-test:
    name: Deploy test backend
    if: inputs.environment == 'test'
    runs-on: ubuntu-latest
    needs: validate
    environment: test
    steps:
      - name: Trigger test deploy hook
        run: curl --fail --show-error --silent --request POST "${{ secrets.BACKEND_TEST_DEPLOY_HOOK_URL }}"

  deploy-production:
    name: Deploy production backend
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Trigger production deploy hook
        run: curl --fail --show-error --silent --request POST "${{ secrets.BACKEND_PROD_DEPLOY_HOOK_URL }}"
